name = "portfolio-demos-api"
main = "worker.js"
compatibility_date = "2024-09-25"

# Optional: KV namespace for rate limiting
# Uncomment after creating: npx wrangler kv:namespace create "RATE_LIMIT_KV"
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "e590474cd7b44e19918f5c396e77a5a0"

[vars]
ALLOWED_ORIGIN = "https://tatsumosoft.com"

# Set secret via: npx wrangler secret put ANTHROPIC_API_KEY
# Then paste your key when prompted

